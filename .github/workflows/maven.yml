name: Maven Build and Test

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: |
        cd nocode-api-generator
        mvn clean compile -DskipTests

    - name: Run Tests
      run: |
        cd nocode-api-generator/nocode-api-admin
        mvn test

    - name: Package
      run: |
        cd nocode-api-generator
        mvn package -DskipTests

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nocode-api-admin-jar
        path: nocode-api-generator/nocode-api-admin/target/*.jar

  frontend-build:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: ruoyi-nocode-ui/package-lock.json

    - name: Install dependencies
      run: |
        cd ruoyi-nocode-ui
        npm install

    - name: Build
      run: |
        cd ruoyi-nocode-ui
        npm run build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: ruoyi-nocode-ui/dist/**/*

  rule-check:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Rule Guard
      run: |
        pip install pytest
        python auto-dev/scripts/rule_guard.py check nocode-api-generator

    - name: Health Check
      run: |
        python auto-dev/scripts/orchestrator_ops.py health

  quality-gate:
    runs-on: ubuntu-latest
    needs: [build, frontend-build, rule-check]
    if: always()

    steps:
    - name: Check Results
      run: |
        echo "Build Status: ${{ needs.build.result }}"
        echo "Frontend Build Status: ${{ needs.frontend-build.result }}"
        echo "Rule Check Status: ${{ needs.rule-check.result }}"
        if [ "${{ needs.build.result }}" != "success" ]; then
          echo "Build failed, quality gate blocked"
          exit 1
        fi
        echo "Quality gate passed!"
