<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Dev 2.0 Pipeline Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e6edf3;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #30363d;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #58a6ff;
        }
        .header .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-badge.running { background: #238636; color: #fff; }
        .status-badge.stopped { background: #6e7681; color: #fff; }
        .status-badge.error { background: #da3633; color: #fff; }

        .progress-section {
            background: #161b22;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #30363d;
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .progress-header .pipeline-id {
            font-size: 14px;
            color: #8b949e;
        }
        .progress-header .percentage {
            font-size: 28px;
            font-weight: 700;
            color: #58a6ff;
        }
        .progress-bar {
            height: 8px;
            background: #30363d;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #238636, #2ea043);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .progress-bar .fill.in-progress { background: linear-gradient(90deg, #1f6feb, #58a6ff); }
        .progress-bar .fill.failed { background: linear-gradient(90deg, #da3633, #f85149); }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        .info-card {
            background: #161b22;
            border-radius: 8px;
            padding: 16px;
            border: 1px solid #30363d;
        }
        .info-card .label {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 4px;
        }
        .info-card .value {
            font-size: 16px;
            font-weight: 600;
        }

        .stages-section {
            background: #161b22;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #30363d;
        }
        .stages-section h3 {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 16px;
        }
        .stages-timeline {
            display: flex;
            justify-content: space-between;
            position: relative;
        }
        .stages-timeline::before {
            content: '';
            position: absolute;
            top: 16px;
            left: 24px;
            right: 24px;
            height: 2px;
            background: #30363d;
        }
        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
            flex: 1;
        }
        .stage-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-bottom: 8px;
            border: 2px solid #30363d;
            background: #161b22;
        }
        .stage-dot.completed { background: #238636; border-color: #238636; color: #fff; }
        .stage-dot.in-progress { background: #1f6feb; border-color: #1f6feb; color: #fff;
            animation: pulse 2s infinite; }
        .stage-dot.failed { background: #da3633; border-color: #da3633; color: #fff; }
        .stage-dot.pending { background: #161b22; border-color: #30363d; color: #8b949e; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(31, 111, 235, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(31, 111, 235, 0); }
        }

        .stage-name {
            font-size: 12px;
            color: #8b949e;
            text-align: center;
        }
        .stage.completed .stage-name, .stage.in-progress .stage-name { color: #e6edf3; }

        .team-section {
            background: #161b22;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #30363d;
        }
        .team-section h3 {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 12px;
        }
        .team-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .team-member {
            padding: 6px 12px;
            background: #30363d;
            border-radius: 16px;
            font-size: 12px;
        }
        .team-member.active { background: #1f6feb; }

        .memory-section {
            background: #161b22;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #30363d;
        }
        .memory-section h3 {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 12px;
        }
        .memory-bars { display: flex; flex-direction: column; gap: 12px; }
        .memory-tier {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .memory-tier .tier-name {
            width: 50px;
            font-size: 12px;
            color: #8b949e;
        }
        .memory-tier .tier-bar {
            flex: 1;
            height: 8px;
            background: #30363d;
            border-radius: 4px;
            overflow: hidden;
        }
        .memory-tier .tier-bar .fill {
            height: 100%;
            border-radius: 4px;
        }
        .memory-tier .tier-bar .fill.hot { background: #f85149; }
        .memory-tier .tier-bar .fill.warm { background: #d29922; }
        .memory-tier .tier-bar .fill.cold { background: #58a6ff; }
        .memory-tier .tier-count {
            width: 80px;
            font-size: 12px;
            text-align: right;
            color: #8b949e;
        }

        .activity-section {
            background: #161b22;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #30363d;
        }
        .activity-section h3 {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 12px;
        }
        .activity-log {
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
        }
        .activity-item {
            padding: 6px 0;
            border-bottom: 1px solid #21262d;
            display: flex;
            gap: 12px;
        }
        .activity-item .time { color: #6e7681; }
        .activity-item .msg { color: #e6edf3; }
        .activity-item.success .msg { color: #3fb950; }
        .activity-item.error .msg { color: #f85149; }
        .activity-item.info .msg { color: #58a6ff; }

        .footer {
            text-align: center;
            padding: 16px;
            color: #6e7681;
            font-size: 12px;
        }
        .footer .refresh {
            color: #58a6ff;
            cursor: pointer;
        }
        .footer .refresh:hover { text-decoration: underline; }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
        }
        .no-data .icon { font-size: 48px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Auto-Dev 2.0 Pipeline</h1>
            <span id="statusBadge" class="status-badge stopped">No Pipeline</span>
        </div>

        <div id="content">
            <div class="no-data">
                <div class="icon">📊</div>
                <p>No pipeline running</p>
                <p style="font-size: 12px; margin-top: 8px;">Start a pipeline to see the dashboard</p>
            </div>
        </div>

        <div class="footer">
            Auto-refresh: <span id="refreshTime" class="refresh">10s</span> |
            Last update: <span id="lastUpdate">--</span>
        </div>
    </div>

    <script>
        const STATUS_FILE = 'tasks/pipeline/_current_status.json';
        let refreshInterval = 10;
        let countdown = refreshInterval;

        function formatTime(isoString) {
            if (!isoString) return '--';
            const d = new Date(isoString);
            return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function getStageIcon(status) {
            switch(status) {
                case 'completed': return '✓';
                case 'in_progress': return '⟳';
                case 'failed': return '✗';
                default: return '○';
            }
        }

        function getStageClass(status) {
            switch(status) {
                case 'completed': return 'completed';
                case 'in_progress': return 'in-progress';
                case 'failed': return 'failed';
                default: return 'pending';
            }
        }

        function render(data) {
            if (!data || !data.pipeline_id) {
                document.getElementById('content').innerHTML = `
                    <div class="no-data">
                        <div class="icon">📊</div>
                        <p>No pipeline running</p>
                        <p style="font-size: 12px; margin-top: 8px;">Start a pipeline to see the dashboard</p>
                    </div>
                `;
                document.getElementById('statusBadge').className = 'status-badge stopped';
                document.getElementById('statusBadge').textContent = 'No Pipeline';
                return;
            }

            const stages = data.stages || {};
            const stageNames = {
                'requirement': '需求',
                'design': '设计',
                'development': '开发',
                'testing': '测试',
                'deployment': '部署'
            };

            // Calculate progress
            const completedStages = Object.values(stages).filter(s => s.status === 'completed').length;
            const totalStages = 5;
            const progress = Math.round((completedStages / totalStages) * 100);

            // Determine overall status
            let overallStatus = 'running';
            let statusText = 'Running';
            if (progress === 100) {
                overallStatus = 'completed';
                statusText = 'Completed';
            } else if (Object.values(stages).some(s => s.status === 'failed')) {
                overallStatus = 'error';
                statusText = 'Failed';
            }

            // Build stages HTML
            let stagesHtml = '';
            for (const [key, name] of Object.entries(stageNames)) {
                const stage = stages[key] || {};
                const stageClass = getStageClass(stage.status);
                stagesHtml += `
                    <div class="stage ${stageClass}">
                        <div class="stage-dot ${stageClass}">${getStageIcon(stage.status)}</div>
                        <div class="stage-name">${name}</div>
                    </div>
                `;
            }

            // Build team HTML
            const team = data.team || [];
            let teamHtml = '';
            const roleLabels = {
                'product-manager': 'PM',
                'architect': 'ARCH',
                'backend-dev': 'BE',
                'frontend-dev': 'FE',
                'ui-designer': 'UI',
                'tester': 'TEST',
                'devops': 'DEVOPS',
                'reviewer': 'REVIEW'
            };
            for (const member of team) {
                const label = roleLabels[member.role] || member.role;
                const active = member.status === 'active' || member.status === 'in_progress' ? ' active' : '';
                teamHtml += `<span class="team-member${active}">${label}</span>`;
            }

            // Memory bars
            const memory = data.memory || {};
            const hotLines = memory.hot_lines || 0;
            const warmLines = memory.warm_lines || 0;
            const hotMax = 100;
            const warmMax = 200;
            const coldFiles = memory.cold_files || 0;

            // Activity log
            const activities = data.activities || [];

            document.getElementById('content').innerHTML = `
                <div class="progress-section">
                    <div class="progress-header">
                        <span class="pipeline-id">${data.pipeline_id}</span>
                        <span class="percentage">${progress}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="fill ${overallStatus === 'error' ? 'failed' : ''}" style="width: ${progress}%"></div>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-card">
                        <div class="label">Current Stage</div>
                        <div class="value">${stageNames[data.current_stage] || '--'}</div>
                    </div>
                    <div class="info-card">
                        <div class="label">Started</div>
                        <div class="value">${formatTime(data.started_at)}</div>
                    </div>
                    <div class="info-card">
                        <div class="label">Last Update</div>
                        <div class="value">${formatTime(data.last_updated)}</div>
                    </div>
                </div>

                <div class="stages-section">
                    <h3>Pipeline Stages</h3>
                    <div class="stages-timeline">${stagesHtml}</div>
                </div>

                <div class="team-section">
                    <h3>Team (${team.length})</h3>
                    <div class="team-grid">${teamHtml || '<span class="team-member">No team</span>'}</div>
                </div>

                <div class="memory-section">
                    <h3>Memory Tiers</h3>
                    <div class="memory-bars">
                        <div class="memory-tier">
                            <span class="tier-name">HOT</span>
                            <div class="tier-bar"><div class="fill hot" style="width: ${Math.min(100, hotLines)}%"></div></div>
                            <span class="tier-count">${hotLines}/${hotMax} lines</span>
                        </div>
                        <div class="memory-tier">
                            <span class="tier-name">WARM</span>
                            <div class="tier-bar"><div class="fill warm" style="width: ${Math.min(100, warmLines / 2)}%"></div></div>
                            <span class="tier-count">${warmLines}/${warmMax} lines</span>
                        </div>
                        <div class="memory-tier">
                            <span class="tier-name">COLD</span>
                            <div class="tier-bar"><div class="fill cold" style="width: ${Math.min(100, coldFiles * 10)}%"></div></div>
                            <span class="tier-count">${coldFiles} files</span>
                        </div>
                    </div>
                </div>

                ${activities.length > 0 ? `
                <div class="activity-section">
                    <h3>Recent Activity</h3>
                    <div class="activity-log">
                        ${activities.slice(-10).reverse().map(a => `
                            <div class="activity-item ${a.type || ''}">
                                <span class="time">${formatTime(a.time)}</span>
                                <span class="msg">${a.message}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}
            `;

            document.getElementById('statusBadge').className = `status-badge ${overallStatus}`;
            document.getElementById('statusBadge').textContent = statusText;
            document.getElementById('lastUpdate').textContent = formatTime(data.last_updated);
        }

        async function loadStatus() {
            try {
                const response = await fetch(STATUS_FILE + '?t=' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    render(data);
                } else {
                    render(null);
                }
            } catch (e) {
                // Try relative path from dashboard location
                try {
                    const response = await fetch('../' + STATUS_FILE + '?t=' + Date.now());
                    if (response.ok) {
                        const data = await response.json();
                        render(data);
                    } else {
                        render(null);
                    }
                } catch (e2) {
                    render(null);
                }
            }
        }

        function startAutoRefresh() {
            countdown = refreshInterval;
            loadStatus();

            setInterval(() => {
                countdown--;
                document.getElementById('refreshTime').textContent = countdown + 's';
                if (countdown <= 0) {
                    countdown = refreshInterval;
                    loadStatus();
                }
            }, 1000);
        }

        document.getElementById('refreshTime').addEventListener('click', () => {
            countdown = 1;
        });

        startAutoRefresh();
    </script>
</body>
</html>
