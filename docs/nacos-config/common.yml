# Nacos 公共配置模板
# 请将此文件内容复制到 Nacos 配置中心，Data ID: common.yml

spring:
  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# 全局跨域配置
cors:
  allowed-origins: "*"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# 安全配置
security:
  # 排除路径（无需认证）
  exclude-paths:
    - /actuator/health
    - /actuator/info
    - /swagger-ui.html
    - /swagger-ui/**
    - /v3/api-docs/**
    - /auth/login
    - /auth/register
    - /auth/captcha

# 日志配置
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  level:
    root: info
    com.ruoyi: debug

# 公共业务配置
app:
  version: 1.0.0
  name: RuoYi-Cloud-Nocode
  description: 零代码微服务平台
