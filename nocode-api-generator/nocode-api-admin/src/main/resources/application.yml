# NoCode API Admin 配置文件

server:
  port: 8081
  servlet:
    context-path: /nocode-admin

spring:
  thymeleaf:
    cache: false
    mode: HTML
  resources:
    static-locations: classpath:/static/,classpath:/public/,classpath:/resources/,file:src/main/frontend/dist
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  # 解决 Springfox 与 Spring Boot 2.6+ 路径匹配不兼容问题
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# NoCode API 配置
nocode:
  api:
    enabled: true
    admin:
      enabled: true
      port: 8081
    # 数据源配置 - 支持 MySQL 和 PostgreSQL，根据 jdbc-url 自动检测数据库类型
    datasources:
      # MySQL 示例
#      - name: primary
#        jdbc-url: jdbc:mysql://localhost:3306/auto_api?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
#        username: root
#        password: zk@12456
#        # driver-class-name 可省略，会自动从 jdbc-url 检测
#        # driver-class-name: com.mysql.cj.jdbc.Driver
#        initialSize: 5
#        minIdle: 5
#        maxActive: 20

      # PostgreSQL 示例（取消注释以使用）
       - name: postgres_primary
#         jdbc-url: jdbc:postgresql://192.168.10.68:5432/hrp-cloud?currentSchema=hrp_api
#         username: postgres
#         password: postgres
         jdbc-url: jdbc:postgresql://127.0.0.1:15432/cost?currentSchema=hrp_base
         username: ods
         password: Test@123
         # driver-class-name 可省略，会自动检测
         # driver-class-name: org.postgresql.Driver
         initialSize: 5
         minIdle: 5
         maxActive: 20

    defaultPageSize: 10
    maxPageSize: 1000

# 日志配置
logging:
  level:
    com.nocode: DEBUG
    org.springframework: INFO
    org.springframework.web: WARN
