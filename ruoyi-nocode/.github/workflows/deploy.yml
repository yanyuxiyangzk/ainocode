name: Deploy

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  JAVA_VERSION: '17'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/ruoyi-nocode

jobs:
  build-packages:
    name: Build JAR Packages
    runs-on: ubuntu-latest
    outputs:
      gateway-sha: ${{ steps.build.outputs.gateway-sha }}
      auth-sha: ${{ steps.build.outputs.auth-sha }}
      system-sha: ${{ steps.build.outputs.system-sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'eclipse-temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        id: build
        run: |
          mvn clean package -DskipTests -B

          echo "gateway-sha=$(md5sum ruoyi-nocode-gateway/target/*.jar | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "auth-sha=$(md5sum ruoyi-nocode-auth/target/*.jar | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "system-sha=$(md5sum ruoyi-nocode-system/target/*.jar | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Upload JAR Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jar-packages
          path: |
            ruoyi-nocode-gateway/target/*.jar
            ruoyi-nocode-auth/target/*.jar
            ruoyi-nocode-system/target/*.jar
          retention-days: 5

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-packages
    strategy:
      matrix:
        service:
          - gateway
          - auth
          - system

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download JAR Artifacts
        uses: actions/download-artifact@v4
        with:
          name: jar-packages
          path: ${{ matrix.service }}/target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ${{ inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name != 'pull_request'
    environment:
      name: ${{ inputs.environment || 'staging' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy with Docker Compose
        run: |
          export TAG=${{ github.ref_name }}
          if [[ "$TAG" == refs/heads/master ]]; then
            TAG=latest
          fi

          # Pull latest images
          docker compose -f docker/docker-compose.yml pull

          # Update image tags in compose file
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-gateway:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-gateway:${TAG}|g" docker/docker-compose.yml
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-auth:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-auth:${TAG}|g" docker/docker-compose.yml
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-system:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-system:${TAG}|g" docker/docker-compose.yml

          # Start services
          docker compose -f docker/docker-compose.yml up -d

      - name: Verify Deployment
        run: |
          sleep 30
          docker compose -f docker/docker-compose.yml ps
          docker compose -f docker/docker-compose.yml logs --tail=50