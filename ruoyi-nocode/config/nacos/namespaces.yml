# Nacos Configuration Namespaces
# Namespace ID (UUID format) -> Namespace Name

namespaces:
  # 默认命名空间 - 用于开发环境
  - id: public
    name: Public
    description: 默认命名空间，所有服务共享配置

  # 开发环境命名空间
  - id: dev
    name: Development
    description: 开发环境配置

  # 测试环境命名空间
  - id: test
    name: Testing
    description: 测试环境配置

  # 预发布环境命名空间
  - id: pre
    name: Pre-Production
    description: 预发布环境配置

  # 生产环境命名空间
  - id: prod
    name: Production
    description: 生产环境配置

# 分组配置
groups:
  DEFAULT_GROUP:
    name: DEFAULT_GROUP
    description: 默认分组

  # 微服务分组
  MICROSERVICE_GROUP:
    name: Microservice
    description: 微服务配置分组

  # 网关分组
  GATEWAY_GROUP:
    name: Gateway
    description: 网关配置分组

  # 基础设施分组
  INFRA_GROUP:
    name: Infrastructure
    description: 基础设施配置分组

  # 业务分组
  BUSINESS_GROUP:
    name: Business
    description: 业务配置分组
