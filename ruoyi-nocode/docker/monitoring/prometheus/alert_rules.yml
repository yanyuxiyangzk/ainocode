groups:
  - name: ruoyi-nocode-alerts
    rules:
      # 服务不可用告警
      - alert: ServiceDown
        expr: up{job=~"ruoyi-nocode-.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "服务 {{ $labels.app }} 不可用"
          description: "服务 {{ $labels.app }} (job: {{ $labels.job }}) 已经停止运行超过 1 分钟"

      # JVM 堆内存使用率告警
      - alert: JvmHeapMemoryHigh
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM 堆内存使用率过高"
          description: "服务 {{ $labels.app }} 的 JVM 堆内存使用率超过 90%"

      # JVM 非堆内存使用率告警
      - alert: JvmNonHeapMemoryHigh
        expr: jvm_memory_used_bytes{area="nonheap"} / jvm_memory_max_bytes{area="nonheap"} > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM 非堆内存使用率过高"
          description: "服务 {{ $labels.app }} 的 JVM 非堆内存使用率超过 90%"

      # HTTP 请求延迟告警
      - alert: HttpRequestLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job=~"ruoyi-nocode-.*"}[5m])) by (le, job)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP 请求延迟过高"
          description: "服务 {{ $labels.job }} 的 P95 响应时间超过 2 秒"

      # HTTP 请求错误率告警
      - alert: HttpRequestErrorRateHigh
        expr: sum(rate(http_server_requests_seconds_count{job=~"ruoyi-nocode-.*", status=~"5.."}[5m])) / sum(rate(http_server_requests_seconds_count{job=~"ruoyi-nocode-.*"}[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "HTTP 请求错误率过高"
          description: "服务 {{ $labels.job }} 的 5xx 错误率超过 5%"

      # 数据库连接池告警
      - alert: DatabaseConnectionPoolHigh
        expr: hikaricp_connections_active / hikaricp_connections_max > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "数据库连接池使用率过高"
          description: "服务 {{ $labels.app }} 的数据库连接池使用率超过 90%"

      # Redis 连接池告警
      - alert: RedisConnectionPoolHigh
        expr: redis_connection_pool_active / redis_connection_pool_max > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 连接池使用率过高"
          description: "服务 {{ $labels.app }} 的 Redis 连接池使用率超过 90%"

      # JVM GC 频繁告警
      - alert: JvmGcPausesHigh
        expr: rate(jvm_gc_pause_seconds_sum[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM GC 频繁"
          description: "服务 {{ $labels.app }} 的 GC 暂停频率过高"

      # CPU 使用率告警
      - alert: CpuUsageHigh
        expr: system_cpu_usage > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 使用率过高"
          description: "服务 {{ $labels.app }} 的 CPU 使用率超过 90%"
