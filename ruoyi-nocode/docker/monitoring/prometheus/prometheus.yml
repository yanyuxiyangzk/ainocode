global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ruoyi-nocode'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Gateway 服务
  - job_name: 'ruoyi-nocode-gateway'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: 'gateway'
          app: 'ruoyi-nocode-gateway'

  # Auth 服务
  - job_name: 'ruoyi-nocode-auth'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:9201']
        labels:
          service: 'auth'
          app: 'ruoyi-nocode-auth'

  # System 服务
  - job_name: 'ruoyi-nocode-system'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:9200']
        labels:
          service: 'system'
          app: 'ruoyi-nocode-system'

  # Spring Boot 应用通用指标
  - job_name: 'spring-boot-apps'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:8080', 'host.docker.internal:9200', 'host.docker.internal:9201']
        labels:
          group: 'ruoyi-nocode'
