{{- if .Values.auth.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ruoyi-nocode.fullname" . }}-auth
  namespace: {{ .Release.Namespace | default .Values.namespace }}
  labels:
    app: {{ include "ruoyi-nocode.fullname" . }}-auth
    app.kubernetes.io/name: {{ include "ruoyi-nocode.fullname" . }}-auth
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Values.image.tag | default "latest" }}
    app.kubernetes.io/component: auth
spec:
  replicas: {{ .Values.auth.replicaCount | default 2 }}
  selector:
    matchLabels:
      app: {{ include "ruoyi-nocode.fullname" . }}-auth
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9201"
        prometheus.io/path: "/actuator/prometheus"
      labels:
        app: {{ include "ruoyi-nocode.fullname" . }}-auth
        app.kubernetes.io/name: {{ include "ruoyi-nocode.fullname" . }}-auth
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/version: {{ .Values.image.tag | default "latest" }}
    spec:
      serviceAccountName: {{ include "ruoyi-nocode.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: auth
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.auth.image.repository | default "ruoyi-nocode-auth" }}:{{ .Values.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.auth.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 9201
              protocol: TCP
          env:
            - name: NACOS_SERVER
              value: {{ .Values.auth.env.NACOS_SERVER | default "nacos:8848" }}
            - name: NACOS_NAMESPACE
              value: {{ .Values.auth.env.NACOS_NAMESPACE | default "public" }}
            - name: NACOS_GROUP
              value: {{ .Values.auth.env.NACOS_GROUP | default "DEFAULT_GROUP" }}
            - name: DB_HOST
              value: {{ .Values.auth.env.DB_HOST | default "postgresql.primary" }}
            - name: DB_PORT
              value: {{ .Values.auth.env.DB_PORT | default "5432" | quote }}
            - name: DB_NAME
              value: {{ .Values.auth.env.DB_NAME | default "cost" }}
            - name: DB_USER
              value: {{ .Values.auth.env.DB_USER | default "ods" }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ruoyi-nocode.fullname" . }}-postgresql
                  key: password
                  optional: true
            - name: REDIS_HOST
              value: {{ .Values.auth.env.REDIS_HOST | default "redis-master" }}
            - name: REDIS_PORT
              value: {{ .Values.auth.env.REDIS_PORT | default "6379" | quote }}
            - name: REDIS_DATABASE
              value: {{ .Values.auth.env.REDIS_DATABASE | default "0" | quote }}
            - name: JWT_SECRET
              value: {{ .Values.security.jwt.secret | default "ruoyi-nocode-secret-key-2026" }}
            - name: JWT_TTL
              value: {{ .Values.security.jwt.ttl | default "7200000" | quote }}
            - name: JAVA_OPTS
              value: "-Xms{{ .Values.auth.jvm.xms | default "256m" }} -Xmx{{ .Values.auth.jvm.xmx | default "512m" }} -Xmn{{ .Values.auth.jvm.xmn | default "128m" }}"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.auth.resources | nindent 10 }}
          volumeMounts:
            - name: plugins
              mountPath: /home/nocode-plugins
      volumes:
        - name: plugins
          emptyDir: {}
      {{- with .Values.auth.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.auth.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.auth.tolerations }}
      tolerations:
        {{- toYaml . | nindent 6 }}
      {{- end }}
{{- end }}
