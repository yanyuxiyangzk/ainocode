{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ruoyi-nocode.serviceAccountName" . }}
  namespace: {{ .Release.Namespace | default .Values.namespace }}
  labels:
    app: {{ include "ruoyi-nocode.fullname" . }}
    app.kubernetes.io/name: {{ include "ruoyi-nocode.fullname" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

{{- if .Values.rbac.create -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ruoyi-nocode.fullname" . }}
  namespace: {{ .Release.Namespace | default .Values.namespace }}
  labels:
    app: {{ include "ruoyi-nocode.fullname" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  {{- toYaml .Values.rbac.rules | nindent 2 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ruoyi-nocode.fullname" . }}
  namespace: {{ .Release.Namespace | default .Values.namespace }}
  labels:
    app: {{ include "ruoyi-nocode.fullname" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ruoyi-nocode.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ruoyi-nocode.serviceAccountName" . }}
    namespace: {{ .Release.Namespace | default .Values.namespace }}
{{- end }}
