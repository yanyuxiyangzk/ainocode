server:
  port: 9201

spring:
  # Cloud Nacos Discovery - 服务注册与发现
  cloud:
    nacos:
      discovery:
        enabled: true
        register-enabled: true
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        metadata:
          version: 1.0.0
          region: default
          zone: default
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        healthy: true

  # PostgreSQL数据库配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:15432}/${DB_NAME:cost}
    username: ${DB_USER:ods}
    password: ${DB_PASSWORD:Test@123}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      # 连接有效性检查
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.ruoyi.nocode.**.domain
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: delFlag
      logic-delete-value: 2
      logic-not-delete-value: 0

# Sa-Token配置
sa-token:
  token-name: Authorization
  timeout: 7200
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

# JWT配置
jwt:
  secret: ${JWT_SECRET:ruoyi-nocode-secret-key-2026}
  issuer: ${JWT_ISSUER:ruoyi-nocode}
  subject: ${JWT_SUBJECT:auth}
  ttlMillis: ${JWT_TTL:7200000}

# Swagger配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.ruoyi.nocode.system

# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true
    nacos:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# Micrometer 指标配置
micrometer:
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    enabled: false

# 日志配置
logging:
  level:
    com.ruoyi.nocode: debug
    org.pf4j: debug

# PF4J 插件配置
pf4j:
  # 是否启用插件系统
  enabled: ${PF4J_ENABLED:true}
  # 插件目录
  pluginsDir: ${PF4J_PLUGINS_DIR:${user.home}/nocode-plugins}
  # 插件临时目录
  tempDir: ${PF4J_TEMP_DIR:${user.home}/nocode-plugins/temp}

# 数据库备份配置
backup:
  # 是否启用备份
  enabled: ${BACKUP_ENABLED:true}
  # 备份目录
  backup-dir: ${BACKUP_DIR:./backups}
  # 保留天数
  retention-days: ${BACKUP_RETENTION_DAYS:30}
  # 压缩方式: gzip 或 none
  compression: ${BACKUP_COMPRESSION:gzip}
  # S3备份启用
  s3-enabled: ${BACKUP_S3_ENABLED:false}
  # S3存储桶
  s3-bucket: ${BACKUP_S3_BUCKET:ruoyi-nocode-backups}
  # S3前缀
  s3-prefix: ${BACKUP_S3_PREFIX:postgresql}
  # S3端点(用于S3兼容存储)
  s3-endpoint: ${BACKUP_S3_ENDPOINT:}
  # 备份策略: daily, weekly, monthly
  strategy: ${BACKUP_STRATEGY:daily}
  # 定时备份Cron表达式 (默认每天凌晨2点)
  schedule: ${BACKUP_SCHEDULE:0 0 2 * * ?}
